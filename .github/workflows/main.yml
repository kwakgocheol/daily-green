name: Auto Green Grass

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시에 자동으로 작동합니다.
  workflow_dispatch: # 원할 때 수동으로도 켤 수 있게 하는 버튼입니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Update README
      run: |
        echo "마지막 출석 체크 시간: $(date)" > README.md
        
    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        git commit -m "매일매일 잔디 심기 🌿"
        git push
